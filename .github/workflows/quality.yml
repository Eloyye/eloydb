name: Quality Checks

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  maven:
    name: Maven Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 26
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "26"
          cache: maven
          cache-dependency-path: pom.xml

      - name: Check formatting
        run: mvn -B --no-transfer-progress spotless:check

      - name: Run tests and static analysis
        run: mvn -B --no-transfer-progress verify

      - name: Run Google Checkstyle
        run: mvn -B --no-transfer-progress checkstyle:check
